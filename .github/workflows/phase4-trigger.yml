# Trigger Phase 4 on: label added OR /publish comment
#
# Two trigger paths:
# 1. pull_request_target: labeled → reviewer adds 'approved-for-publish' label
# 2. issue_comment: /publish → reviewer comments "/publish" (fallback)
#
# Both have full secrets + write permissions.

name: "Phase 4: Trigger"

on:
  pull_request_target:
    types: [labeled]
  issue_comment:
    types: [created]

permissions:
  actions: write
  checks: write
  pull-requests: read

jobs:
  trigger-on-label:
    name: Trigger (label)
    if: >-
      github.event_name == 'pull_request_target' &&
      github.event.label.name == 'approved-for-publish' &&
      github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Create check run (in_progress)
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          CHECK_ID=$(gh api "repos/${{ github.repository }}/check-runs" \
            --method POST \
            -f name="Phase 4: Publish" \
            -f head_sha="$HEAD_SHA" \
            -f status="in_progress" \
            -f output[title]="Phase 4: Publish" \
            -f output[summary]="Building, publishing, and merging..." \
            --jq '.id')
          echo "check_run_id=${CHECK_ID}" >> "$GITHUB_OUTPUT"
          echo "head_sha=${HEAD_SHA}" >> "$GITHUB_OUTPUT"
          echo "Created check run ${CHECK_ID} on ${HEAD_SHA}"

      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Dispatch Phase 4
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          PR_NUM="${{ github.event.pull_request.number }}"
          echo "Label trigger: dispatching Phase 4 for PR #${PR_NUM}..."
          gh workflow run "Phase 4: Publish" \
            --repo "${{ github.repository }}" \
            --ref main \
            -f pr_number="${PR_NUM}" \
            -f check_run_id="${{ steps.check.outputs.check_run_id }}" \
            -f head_sha="${{ steps.check.outputs.head_sha }}"
          echo "✅ Phase 4 dispatched"

  trigger-on-comment:
    name: Trigger (/publish)
    if: >-
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '/publish') &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: ubuntu-latest
    steps:
      - name: Check PR is approved
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUM="${{ github.event.issue.number }}"
          APPROVED=$(gh api "repos/${{ github.repository }}/pulls/${PR_NUM}/reviews" \
            --jq '[.[] | select(.state == "APPROVED")] | length')
          echo "PR #${PR_NUM}: ${APPROVED} approved review(s)"
          if [ "$APPROVED" -eq 0 ]; then
            echo "::error::PR #${PR_NUM} has no approved reviews. Approve first."
            exit 1
          fi
          HEAD_SHA=$(gh api "repos/${{ github.repository }}/pulls/${PR_NUM}" --jq '.head.sha')
          echo "pr_number=${PR_NUM}" >> "$GITHUB_OUTPUT"
          echo "head_sha=${HEAD_SHA}" >> "$GITHUB_OUTPUT"

      - name: Create check run (in_progress)
        id: check-run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CHECK_ID=$(gh api "repos/${{ github.repository }}/check-runs" \
            --method POST \
            -f name="Phase 4: Publish" \
            -f head_sha="${{ steps.check.outputs.head_sha }}" \
            -f status="in_progress" \
            -f output[title]="Phase 4: Publish" \
            -f output[summary]="Building, publishing, and merging..." \
            --jq '.id')
          echo "check_run_id=${CHECK_ID}" >> "$GITHUB_OUTPUT"

      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Dispatch Phase 4
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          PR_NUM="${{ steps.check.outputs.pr_number }}"
          echo "Comment trigger: dispatching Phase 4 for PR #${PR_NUM}..."
          gh workflow run "Phase 4: Publish" \
            --repo "${{ github.repository }}" \
            --ref main \
            -f pr_number="${PR_NUM}" \
            -f check_run_id="${{ steps.check-run.outputs.check_run_id }}" \
            -f head_sha="${{ steps.check.outputs.head_sha }}"
          echo "✅ Phase 4 dispatched"

      - name: React to comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" \
            -f content="rocket" || true
