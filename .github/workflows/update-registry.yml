# Auto-update registry.json and marketplace.json after official plugin changes
#
# Triggers when skills/ changes are pushed to main (after PR merge).
# Scans all skills/*/plugin.json to regenerate the official plugin entries
# in registry.json and marketplace.json.
#
# Community plugin entries in registry.json are preserved — only official
# entries (type: "official") are regenerated.

name: "Update Registry"

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
  # Manual trigger for one-shot healing (e.g. re-injecting pre-flight into
  # plugins that were merged before this workflow could detect their nested
  # SKILL.md layout). Safe to run anytime — full-scan + idempotent inject.
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-registry:
    name: Update registry & marketplace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history is required so `git log -1 -- skills/<name>` can
          # return the real "last modified" timestamp of each plugin
          # (used by registry.json's modify_date field). Shallow clones
          # cause unchanged plugins to lose their genuine modify_date.
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate official plugin entries
        run: |
          # Scan all skills/*/plugin.json and SKILL.md to build registry entries
          python3 << 'PYEOF'
          import json, os, re, time, subprocess

          def get_plugin_mtime(plugin_dir, fallback_existing=None):
              """Return Unix-epoch timestamp (string) of the last git commit
              that touched plugin_dir. This is the authoritative 'last
              modified' value for the plugin entry — using it prevents
              touching modify_date for plugins that didn't actually change
              in this push. On git error, falls back to the existing
              registry's modify_date for that plugin (preserves history),
              and only as a last resort to current time."""
              try:
                  result = subprocess.run(
                      ["git", "log", "-1", "--format=%ct", "--", plugin_dir],
                      capture_output=True, text=True, check=True,
                  )
                  ts = result.stdout.strip()
                  if ts:
                      return ts
              except Exception:
                  pass
              if fallback_existing:
                  return fallback_existing
              return str(int(time.time()))

          # ── Read current registry (preserve community entries) ──
          with open("registry.json") as f:
              registry = json.load(f)

          # Build a map of existing plugin metadata to preserve type/trust/risk
          existing_meta = {}
          for p in registry["plugins"]:
              existing_meta[p["name"]] = {
                  "type": p.get("type", "official"),
                  "trust_source": p.get("trust_source"),
                  "risk_level": p.get("risk_level"),
                  "category": p.get("category"),
                  "modify_date": p.get("modify_date"),
              }

          # ── Scan skills/ for official plugins ──
          official_plugins = []
          marketplace_plugins = []

          for skill_name in sorted(os.listdir("skills")):
              skill_dir = f"skills/{skill_name}"
              if not os.path.isdir(skill_dir):
                  continue

              pjson_path = f"{skill_dir}/.claude-plugin/plugin.json"
              pyaml_path = f"{skill_dir}/plugin.yaml"
              skill_path = f"{skill_dir}/SKILL.md"

              if not os.path.exists(skill_path):
                  continue

              # Read plugin.json if exists
              pjson = {}
              if os.path.exists(pjson_path):
                  with open(pjson_path) as f:
                      pjson = json.load(f)
              elif os.path.exists(pyaml_path):
                  # Community plugins use plugin.yaml instead of plugin.json
                  import yaml
                  with open(pyaml_path) as f:
                      pyaml_data = yaml.safe_load(f) or {}
                  pjson = {
                      "name": pyaml_data.get("name", skill_name),
                      "version": str(pyaml_data.get("version", "1.0.0")),
                      "description": pyaml_data.get("description", ""),
                      "author": pyaml_data.get("author", {}),
                      "category": pyaml_data.get("category", "utility"),
                      "tags": pyaml_data.get("tags", []),
                  }

              # Read SKILL.md frontmatter
              description = pjson.get("description", "")
              version = pjson.get("version", "1.0.0")
              skill_desc = ""
              with open(skill_path) as f:
                  content = f.read()
                  # Extract frontmatter
                  fm_match = re.search(r'^---\s*\n(.*?)\n---', content, re.DOTALL)
                  if fm_match:
                      fm = fm_match.group(1)
                      for line in fm.split('\n'):
                          if line.startswith('version:'):
                              v = line.split(':', 1)[1].strip().strip('"').strip("'")
                              if v:
                                  version = v
                          if line.startswith('description:'):
                              skill_desc = line.split(':', 1)[1].strip().strip('"')

              name = pjson.get("name", skill_name)

              # Normalize author: Anthropic plugin.json schema requires
              # object {"name": ..., ...}, but some legacy entries use a
              # plain string. Accept both so the workflow doesn't crash
              # on schema-violating community submissions.
              _raw_author = pjson.get("author")
              if isinstance(_raw_author, str):
                  _author_name = _raw_author
              elif isinstance(_raw_author, dict):
                  _author_name = _raw_author.get("name", "OKX")
              else:
                  _author_name = "OKX"
              desc = description or skill_desc or f"Official OKX plugin: {name}"

              # Detect tags from SKILL.md content
              tags = []
              lower_content = content.lower()
              for tag in ["solana", "ethereum", "trading", "signal", "scanner",
                          "sniper", "defi", "memepump", "ranking", "hackathon"]:
                  if tag in lower_content:
                      tags.append(tag)

              # Read category from plugin.yaml (authoritative source)
              category = pjson.get("category", "utility")

              # Detect chains
              chains = []
              for chain in ["solana", "ethereum", "base", "xlayer"]:
                  if chain in lower_content:
                      chains.append(chain)

              # Detect risk level
              risk = "medium"
              if any(t in tags for t in ["trading", "signal", "scanner", "sniper"]):
                  risk = "high"

              # Check if has Python scripts
              has_scripts = os.path.isdir(f"{skill_dir}/scripts") and \
                  any(f.endswith(".py") for f in os.listdir(f"{skill_dir}/scripts"))

              # Determine type: plugin.yaml > existing registry > infer
              existing = existing_meta.get(name, {})
              plugin_type = "official"
              if os.path.exists(pyaml_path):
                  import yaml as _y
                  with open(pyaml_path) as _f:
                      _yd = _y.safe_load(_f) or {}
                  plugin_type = _yd.get("type", existing.get("type", "official"))
              else:
                  plugin_type = existing.get("type", "official")

              # Preserve trust_source and risk_level from existing registry
              trust_source = existing.get("trust_source")
              top_risk = existing.get("risk_level")

              # Build registry entry
              reg_entry = {
                  "name": name,
                  "version": version,
                  "description": desc,
                  "author": {"name": _author_name},
                  "category": existing.get("category") or category,
                  "tags": tags[:10],
                  "type": plugin_type,
                  "components": {
                      "skill": {
                          "repo": "okx/plugin-store",
                          "dir": f"skills/{skill_name}"
                      }
                  },
                  "github_link": f"https://github.com/okx/plugin-store/tree/main/skills/{skill_name}",
                  "skill_md_link": f"https://raw.githubusercontent.com/okx/plugin-store/main/skills/{skill_name}/SKILL.md",
                  "summary_md_link": f"https://raw.githubusercontent.com/okx/plugin-store/main/skills/{skill_name}/SUMMARY.md",
                  "modify_date": get_plugin_mtime(skill_dir, existing.get("modify_date")),
              }

              if trust_source:
                  reg_entry["trust_source"] = trust_source
              if top_risk:
                  reg_entry["risk_level"] = top_risk

              if chains:
                  reg_entry["extra"] = {
                      "chains": chains,
                      "protocols": [],
                      "risk_level": top_risk or risk
                  }

              # Alias from plugin.json or generate from name
              alias = pjson.get("alias")
              if alias:
                  reg_entry["alias"] = alias

              official_plugins.append(reg_entry)

              # Build marketplace entry
              mp_entry = {
                  "name": name,
                  "description": desc,
                  "source": f"./skills/{skill_name}",
                  "category": category,
                  "author": {"name": _author_name}
              }
              marketplace_plugins.append(mp_entry)

              print(f"  ✓ {name} v{version} ({category})")

          # ── Write registry ──
          registry["plugins"] = official_plugins
          with open("registry.json", "w") as f:
              json.dump(registry, f, indent=2, ensure_ascii=False)
              f.write("\n")

          print(f"\nRegistry: {len(official_plugins)} plugins total")

          # ── Update marketplace.json ──
          mp_path = ".claude-plugin/marketplace.json"
          with open(mp_path) as f:
              marketplace = json.load(f)

          marketplace["plugins"] = marketplace_plugins

          with open(mp_path, "w") as f:
              json.dump(marketplace, f, indent=2, ensure_ascii=False)
              f.write("\n")

          print(f"Marketplace: {len(marketplace_plugins)} plugins")

          PYEOF

      - name: Inject pre-flight dependencies into all SKILL.md
        run: |
          # Re-run inject-preflight.py for every skill. The script is
          # idempotent — it detects an existing "auto-injected" block and
          # replaces it in place — so a full scan over all skills is safe
          # and produces a no-op diff for plugins whose pre-flight is
          # already current.
          #
          # NOTE: SKILL.md may be at the top of the plugin dir (Mode A
          # default) OR nested under a subdirectory pointed to by
          # components.skill.dir in plugin.yaml (e.g. Mode A with custom
          # skill_dir like rust-sol-price). The earlier check
          # `[ -f "${plugin_dir}SKILL.md" ]` skipped the nested case and
          # caused real plugins to never get pre-flight injected.
          # inject-preflight.py walks the dir to find SKILL.md itself, so
          # we just need any plugin.yaml to gate the call.
          pip install pyyaml 2>/dev/null || pip3 install pyyaml 2>/dev/null || true
          for plugin_dir in skills/*/; do
            plugin_name="$(basename "$plugin_dir")"
            [ -f "${plugin_dir}plugin.yaml" ] || continue
            # Verify there's at least one SKILL.md somewhere under the dir
            if ! find "$plugin_dir" -name SKILL.md -type f -print -quit | grep -q .; then
              continue
            fi
            echo "Injecting pre-flight for ${plugin_name}..."
            python3 .github/scripts/inject-preflight.py "$plugin_name" "$plugin_dir" || true
          done

      - name: Commit and push if changed
        run: |
          git config user.name "plugin-store-bot"
          git config user.email "bot@plugin-store.local"
          git add registry.json .claude-plugin/marketplace.json skills/
          git diff --staged --quiet && echo "No registry / pre-flight changes" && exit 0

          git commit -m "auto: update registry.json + marketplace.json + pre-flight from skills/"
          git push
          echo "Registry + pre-flight updated"
